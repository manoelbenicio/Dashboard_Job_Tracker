name: jobflow_mobile
description: A premium, agentic job application tracker.
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  google_fonts: ^6.2.1
  google_generative_ai: ^0.4.6
  firebase_core: ^2.25.4
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.4
  shared_preferences: ^2.2.2
  lucide_icons: ^0.257.0
  http: ^1.2.1
  flutter_staggered_animations: ^1.1.1
  share_plus: ^10.0.0
  google_sign_in: ^6.2.2
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
